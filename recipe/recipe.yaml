schema_version: 1

context:
  version: "0.16.0"

package:
  name: cue
  version: ${{ version }}

source:
  url: https://github.com/cue-lang/cue/archive/v${{ version }}.tar.gz
  sha256: c1899ac0fb7e9f95547ce5b94fdb05791a79120abccd8eb81225ea0ac389bb43

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - cue --help

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - license-files/
  summary: The home of the CUE language! Validate and define text-based and dynamic configuration
  homepage: https://github.com/cue-lang/cue
  repository: https://github.com/cue-lang/cue

extra:
  recipe-maintainers:
    - danielnachun
