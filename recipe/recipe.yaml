schema_version: 1

context:
  version: "0.17.0"

package:
  name: cue
  version: ${{ version }}

source:
  url: https://github.com/cue-lang/cue/archive/v${{ version }}.tar.gz
  sha256: c4fbfe638e3d1d37c57adf8ce3ab1b2f47d7fa64387686320d7bbf9fea692be5

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - cue --help

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - license-files/
  summary: The home of the CUE language! Validate and define text-based and dynamic configuration
  homepage: https://github.com/cue-lang/cue
  repository: https://github.com/cue-lang/cue

extra:
  recipe-maintainers:
    - danielnachun
